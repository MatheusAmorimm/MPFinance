<div class="min-h-screen flex-center">
    <div class="card-auth">

        <div class="text-center" style="margin-bottom: 2rem;">
            <h1 style="font-size: 2.25rem; font-weight: 800;">
                MP<span class="text-roxo">Finance</span>
            </h1>
            <p class="text-gray" style="margin-top: 0.5rem;">Bem-vindo de volta!</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" formControlName="email" placeholder="exemplo@email.com">
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" formControlName="password" placeholder="••••••••">
            </div>

            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.875rem;">
                <label style="display: flex; align-items: center; cursor: pointer;" class="text-gray">
                    <input type="checkbox" formControlName="rememberMe" style="margin-right: 0.5rem;">
                    Manter-me conectado?
                </label>
                <a href="#" class="text-roxo" style="text-decoration: none;">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-primary" [disabled]="loginForm.invalid">
                ENTRAR
            </button>
        </form>

        <div class="text-center" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #374151;">
            <p class="text-gray" style="font-size: 0.875rem;">
                Novo por aqui?
                <a routerLink="/register" class="text-roxo"
                    style="font-weight: 700; text-decoration: none; cursor: pointer;">
                    Crie sua conta
                </a>
            </p>
        </div>
    </div>
</div>
