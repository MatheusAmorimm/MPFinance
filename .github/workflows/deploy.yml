name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  ci:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build backend
        working-directory: backend
        run: dotnet build MPFinance.API/MPFinance.API.csproj -c Release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile
          yarn build --configuration production

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            git pull origin main

            docker compose up -d --build

            cd frontend
            yarn install --frozen-lockfile
            yarn build --configuration production
            cd ..

            pm2 restart mpfinance-frontend

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "Aguardando API inicializar..."
            sleep 15
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/swagger/index.html)
            if [ "$STATUS" = "200" ]; then
              echo "✅ API respondendo corretamente (HTTP $STATUS)"
            else
              echo "❌ API não respondeu como esperado (HTTP $STATUS)"
              exit 1
            fi
