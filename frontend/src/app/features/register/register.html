<div class="min-h-screen flex-center">
    <div class="card-auth">

        <div class="text-center" style="margin-bottom: 2rem;">
            <h1 style="font-size: 2.25rem; font-weight: 800;">
                Crie sua <span class="text-roxo">Conta</span>
            </h1>
            <p class="text-gray" style="margin-top: 0.5rem;">Comece sua jornada financeira hoje.</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <div class="form-group">
                <label>Username</label>
                <input type="text" formControlName="name" placeholder="Como iremos te chamar?">
            </div>

            <div class="form-group">
                <label>E-mail</label>
                <input type="email" formControlName="email" placeholder="seu@email.com">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" formControlName="password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Confirmar</label>
                    <input type="password" formControlName="confirmPassword" placeholder="••••••••">
                </div>
            </div>

            <p *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched"
                style="color: #F87171; font-size: 0.75rem; margin-bottom: 1rem; font-weight: 600;">
                * As senhas não coincidem.
            </p>

            <button type="submit" class="btn-primary" [disabled]="registerForm.invalid" style="margin-top: 1rem;">
                CADASTRAR AGORA
            </button>
        </form>

        <div class="text-center" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #374151;">
            <p class="text-gray" style="font-size: 0.875rem;">
                Já tem uma conta?
                <a routerLink="/login" class="text-roxo" style="font-weight: 700; text-decoration: none;">Faça login</a>
            </p>
        </div>
    </div>
</div>
