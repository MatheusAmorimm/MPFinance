version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mpfinance_db
    restart: always
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      # Usando um volume nomeado do Docker para evitar problemas de permissão de pasta no host
      - mpfinance_db_data:/var/lib/mysql

volumes:
  mpfinance_db_data:
