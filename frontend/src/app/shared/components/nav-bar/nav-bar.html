<header class="nav" role="banner">
  <a routerLink="/home" class="nav__brand" aria-label="MPFinance — ir para home">
    <span class="nav__brand-mp" aria-hidden="true">MP</span>Finance
  </a>

  <!-- Hamburger (mobile only) -->
  <button
    type="button"
    class="nav__hamburger"
    (click)="toggleMenu()"
    [attr.aria-expanded]="menuOpen()"
    aria-controls="nav-menu"
    [attr.aria-label]="menuOpen() ? 'Fechar menu' : 'Abrir menu'"
  >
    @if (menuOpen()) {
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true" focusable="false">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    } @else {
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true" focusable="false">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    }
  </button>

  <!-- Menu -->
  <div class="nav__menu" [class.nav__menu--open]="menuOpen()" id="nav-menu">
    <nav aria-label="Navegação principal">
      <ul class="nav__links" role="list">
        <li>
          <a routerLink="/home" routerLinkActive="nav__link--active" ariaCurrentWhenActive="page" class="nav__link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9,22 9,12 15,12 15,22"/>
            </svg>
            Home
          </a>
        </li>
        <li>
          <a routerLink="/transactions" routerLinkActive="nav__link--active" ariaCurrentWhenActive="page" class="nav__link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            Lançamentos
          </a>
        </li>
        <li>
          <a routerLink="/goals" routerLinkActive="nav__link--active" ariaCurrentWhenActive="page" class="nav__link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="12" cy="12" r="6"/>
              <circle cx="12" cy="12" r="2"/>
            </svg>
            Metas
          </a>
        </li>
        <li>
          <a routerLink="/profile" routerLinkActive="nav__link--active" ariaCurrentWhenActive="page" class="nav__link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Meu Perfil
          </a>
        </li>
      </ul>
    </nav>

    <button type="button" class="nav__logout" (click)="logout()" aria-label="Sair da conta">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16,17 21,12 16,7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sair
    </button>
  </div>

  <!-- Backdrop (mobile) -->
  @if (menuOpen()) {
    <div class="nav__backdrop" (click)="menuOpen.set(false)" aria-hidden="true"></div>
  }
</header>
