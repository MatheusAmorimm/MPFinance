version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: mpfinance_db
    restart: always
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mpfinance_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: MPFinance.API/Dockerfile
    container_name: mpfinance_api
    restart: always
    env_file: .env
    environment:
      # Aponta para o serviço 'db' da rede interna do Docker (não localhost)
      DB_CONNECTION_STRING: "Server=db;Database=${MYSQL_DATABASE};Uid=${MYSQL_USER};Pwd=${MYSQL_PASSWORD};AllowPublicKeyRetrieval=true;SslMode=none;"
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
    ports:
      - "5000:80"
    volumes:
      - mpfinance_uploads:/app/wwwroot/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  mpfinance_db_data:
  mpfinance_uploads:
